version: "3"

vars:
  FRONTEND_DIR: ./frontend

tasks:
  # ── Development ────────────────────────────────────────────────
  dev:
    desc: Start dev server with hot-reload via Docker
    cmds:
      - docker compose up --build

  dev:local:
    desc: Start dev server locally (without Docker)
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm dev

  dev:down:
    desc: Stop dev containers
    cmds:
      - docker compose down

  # ── Dependencies ───────────────────────────────────────────────
  install:
    desc: Install frontend dependencies
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm install

  update:
    desc: Update all dependencies interactively
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm update --interactive --latest

  # ── Build ──────────────────────────────────────────────────────
  build:
    desc: Build production Docker image
    cmds:
      - docker compose -f docker-compose.prod.yml build

  build:local:
    desc: Build Nuxt app locally
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm build

  generate:
    desc: Generate static site
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm generate

  preview:
    desc: Preview production build locally
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm preview

  # ── Quality ────────────────────────────────────────────────────
  lint:
    desc: Run ESLint
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm lint

  typecheck:
    desc: Run TypeScript type check
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm typecheck

  # ── Production ─────────────────────────────────────────────────
  prod:
    desc: Start production containers
    cmds:
      - docker compose -f docker-compose.prod.yml up -d

  prod:down:
    desc: Stop production containers
    cmds:
      - docker compose -f docker-compose.prod.yml down

  # ── Utility ────────────────────────────────────────────────────
  logs:
    desc: Tail container logs
    cmds:
      - docker compose logs -f

  shell:
    desc: Open shell in running dev container
    cmds:
      - docker compose exec frontend sh

  clean:
    desc: Remove containers, volumes, and build artifacts
    cmds:
      - docker compose down -v
      - docker compose -f docker-compose.prod.yml down -v
      - rm -rf "{{.FRONTEND_DIR}}/.nuxt" "{{.FRONTEND_DIR}}/.output" "{{.FRONTEND_DIR}}/node_modules"
